name: 更新预览地址

on:
  schedule:
    # 每3小时执行一次（避开整点高峰期）
    - cron: '57 */3 * * *'
  workflow_dispatch:
    # 每3小时执行一次
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 调用腾讯云 API 并更新 Vercel Edge Config
        uses: actions/github-script@v7
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          ZONE_ID: zone-3roxyn3x48r6
          DOMAIN_TEXT: menu-app-wnzrr6ot.edgeone.cool
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          EDGE_CONFIG_ID: ecfg_kevgapgw4z4lmmavmvvaauai6qtk
          VERCEL_TEAM_ID: team_DWUoIBrUor06cG9yNWMV5b4L
        script: |
          const crypto = require('crypto');
          const https = require('https');

          const {
            TENCENT_SECRET_ID, TENCENT_SECRET_KEY,
            ZONE_ID, DOMAIN_TEXT,
            VERCEL_TOKEN, EDGE_CONFIG_ID, VERCEL_TEAM_ID
          } = process.env;

          // 1. 获取腾讯云 Token
          async function getPreviewUrl() {
            const service = 'teo', host = `${service}.tencentcloudapi.com`;
            const ts = Math.floor(Date.now() / 1000);
            const date = new Date(ts * 1000).toISOString().split('T')[0];
            const payload = {
              Interface: 'pages:DescribePagesEncipherToken',
              ZoneId: ZONE_ID,
              Payload: JSON.stringify({ Text: DOMAIN_TEXT }),
            };
            const body = JSON.stringify(payload);
            const canonReq = [
              'POST', '/', '',
              `content-type:application/json\nhost:${host}\n`,
              'content-type;host',
              crypto.createHash('sha256').update(body).digest('hex'),
            ].join('\n');
            const scope = `${date}/${service}/tc3_request`;
            const toSign = [
              'TC3-HMAC-SHA256', ts, scope,
              crypto.createHash('sha256').update(canonReq).digest('hex'),
            ].join('\n');
            const kd = crypto.createHmac('sha256', `TC3${TENCENT_SECRET_KEY}`).update(date).digest();
            const ks = crypto.createHmac('sha256', kd).update(service).digest();
            const kt = crypto.createHmac('sha256', ks).update('tc3_request').digest();
            const sig = crypto.createHmac('sha256', kt).update(toSign).digest('hex');
            const auth = `TC3-HMAC-SHA256 Credential=${TENCENT_SECRET_ID}/${scope}, SignedHeaders=content-type;host, Signature=${sig}`;

            const resp = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: host, path: '/', method: 'POST',
                headers: {
                  'Content-Type': 'application/json', Host: host,
                  'X-TC-Action': 'DescribePagesResources',
                  'X-TC-Timestamp': String(ts),
                  'X-TC-Version': '2022-09-01',
                  'X-TC-Region': 'ap-guangzhou',
                  Authorization: auth,
                },
              }, (res) => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            const result = JSON.parse(resp.Response.Result);
            return `https://${DOMAIN_TEXT}?eo_token=${result.Token}&eo_time=${result.Timestamp}`;
          }

          // 2. 更新 Vercel Edge Config
          async function updateEdgeConfig(previewUrl) {
            const items = JSON.stringify({
              items: [{ operation: 'upsert', key: 'previewUrl', value: previewUrl }],
            });
            let path = `/v1/edge-config/${EDGE_CONFIG_ID}/items`;
            if (VERCEL_TEAM_ID) path += `?teamId=${VERCEL_TEAM_ID}`;

            const resp = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.vercel.com', path, method: 'PATCH',
                headers: {
                  Authorization: `Bearer ${VERCEL_TOKEN}`,
                  'Content-Type': 'application/json',
                },
              }, (res) => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', reject);
              req.write(items);
              req.end();
            });
            return resp;
          }

          // 执行
          console.log('获取预览地址...');
          const url = await getPreviewUrl();
          console.log('预览地址:', url);

          console.log('更新 Edge Config...');
          const result = await updateEdgeConfig(url);
          console.log('结果:', result.status, result.body);

          if (result.status !== 200) {
            core.setFailed(`更新失败: ${result.body}`);
          } else {
            console.log('✅ 更新成功');
          }
