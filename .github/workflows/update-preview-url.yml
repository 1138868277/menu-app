name: 更新重定向地址

on:
  schedule:
    - cron: '57 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取预览地址并生成重定向页
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const https = require('https');
            const fs = require('fs');

            const { TENCENT_SECRET_ID, TENCENT_SECRET_KEY, ZONE_ID, DOMAIN_TEXT } = process.env;

            // 1. 获取腾讯云 Token
            const service = 'teo', host = `${service}.tencentcloudapi.com`;
            const ts = Math.floor(Date.now() / 1000);
            const date = new Date(ts * 1000).toISOString().split('T')[0];
            const payload = {
              Interface: 'pages:DescribePagesEncipherToken',
              ZoneId: ZONE_ID,
              Payload: JSON.stringify({ Text: DOMAIN_TEXT }),
            };
            const body = JSON.stringify(payload);
            const canonReq = [
              'POST', '/', '',
              `content-type:application/json\nhost:${host}\n`,
              'content-type;host',
              crypto.createHash('sha256').update(body).digest('hex'),
            ].join('\n');
            const scope = `${date}/${service}/tc3_request`;
            const toSign = [
              'TC3-HMAC-SHA256', ts, scope,
              crypto.createHash('sha256').update(canonReq).digest('hex'),
            ].join('\n');
            const kd = crypto.createHmac('sha256', `TC3${TENCENT_SECRET_KEY}`).update(date).digest();
            const ks = crypto.createHmac('sha256', kd).update(service).digest();
            const kt = crypto.createHmac('sha256', ks).update('tc3_request').digest();
            const sig = crypto.createHmac('sha256', kt).update(toSign).digest('hex');
            const auth = `TC3-HMAC-SHA256 Credential=${TENCENT_SECRET_ID}/${scope}, SignedHeaders=content-type;host, Signature=${sig}`;

            const resp = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: host, path: '/', method: 'POST',
                headers: {
                  'Content-Type': 'application/json', Host: host,
                  'X-TC-Action': 'DescribePagesResources',
                  'X-TC-Timestamp': String(ts),
                  'X-TC-Version': '2022-09-01',
                  'X-TC-Region': 'ap-guangzhou',
                  Authorization: auth,
                },
              }, (res) => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            const result = JSON.parse(resp.Response.Result);
            const previewUrl = `https://${DOMAIN_TEXT}?eo_token=${result.Token}&eo_time=${result.Timestamp}`;
            console.log('预览地址:', previewUrl);

            // 2. 生成纯 HTML 重定向页（无图片，加载飞快）
            const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=${previewUrl}"><title>39的饮品铺子</title></head><body><script>location.href="${previewUrl}"</script></body></html>`;
            fs.mkdirSync('preview', { recursive: true });
            fs.writeFileSync('preview/index.html', html);

            // 3. 提交推送
            const { execSync } = require('child_process');
            execSync('git config user.name "preview-bot"');
            execSync('git config user.email "preview-bot@users.noreply.github.com"');
            execSync('git add preview/index.html');
            execSync('git diff --cached --quiet || git commit -m "auto: 更新预览地址 [skip ci]"');
            execSync('git push');
            console.log('✅ 已更新');
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          ZONE_ID: zone-3roxyn3x48r6
          DOMAIN_TEXT: menu-app-wnzrr6ot.edgeone.cool
