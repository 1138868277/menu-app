name: 部署菜单页面到 GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'menu-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 构建
        run: |
          cd menu-app
          npm ci
          npm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: menu-app/dist

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
